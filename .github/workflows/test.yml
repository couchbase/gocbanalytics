name: Run Tests

on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:
  workflow_call:

jobs:
  test:
    name: Integration Test

    runs-on: ubuntu-latest
    steps:
      - name: Install cbdinocluster
        run: |
          mkdir -p "$HOME/bin"
          wget -nv -O "$HOME/bin/cbdinocluster" https://github.com/couchbaselabs/cbdinocluster/releases/download/v0.0.118/cbdinocluster-linux-amd64
          chmod +x "$HOME/bin/cbdinocluster"
          echo "$HOME/bin" >> $GITHUB_PATH
      - name: Install s3mock
        run: |
          docker pull adobe/s3mock
          docker pull nginx
      - name: Initialize cbdinocluster
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cbdinocluster -v init --auto
      - name: Start couchbase cluster
        env:
          CLUSTERCONFIG: |
            columnar: true
            nodes:
              - count: 3
                version: 2.2.0-1314
            docker:
              load-balancer: true
              use-dino-certs: true
              jwt: true
        run: |
          CBDC_ID=$(cbdinocluster -v alloc --def="${CLUSTERCONFIG}")
          CBDC_CONNSTR=$(cbdinocluster -v connstr --tls --analytics $CBDC_ID)
          echo "CBDC_ID=$CBDC_ID" >> "$GITHUB_ENV"
          echo "CBDC_CONNSTR=$CBDC_CONNSTR" >> "$GITHUB_ENV"

      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Initialize deps
        run: go get
      - name: Run tests
        timeout-minutes: 40
        env:
          CBCONNSTR: ${{ env.CBDC_CONNSTR }}
        run: |
          go test ./... -v -race
